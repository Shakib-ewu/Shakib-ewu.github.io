<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #F5F5F5;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .intro {
            max-width: 600px;
            width: 100%;
        }

        .intro h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .intro h1:hover {
            color: #007bff;
        }

        .intro p {
            font-size: 1.2rem;
        }

        .intro img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .links a {
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.5rem;
            color: #6c757d;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #343a40;
        }

        .btn-outline-primary {
            margin: 0 10px;
            color: #007bff;
            border-color: #007bff;
            transition: color 0.3s, background-color 0.3s, border-color 0.3s;
        }

        .btn-outline-primary:hover {
            color: #fff;
            background-color: #007bff;
            border-color: #007bff;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #222;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .intro h1 {
                font-size: 2rem;
            }

            .intro p {
                font-size: 1rem;
            }

            .intro img {
                width: 120px;
                height: 120px;
            }

            .btn-outline-primary {
                padding: 8px 10px;
                font-size: 14px;
            }

            .links a {
                font-size: 1.2rem;
                margin: 0 10px;
            }
        }

    </style>
</head>
<body>

<div class="intro">
    <img src="Sakib.jpg" alt="Sakib Sarkar"> <!-- Updated image path -->
    <h1>Sakib Sarkar</h1>
    <p>QA Developer | Automation Expert | Tech-Savvy</p>

    <!-- Navigation Buttons -->
    <div class="text-center my-4">
        <a href="index.html" class="btn btn-outline-primary">Home</a>
        <a href="about.html" class="btn btn-outline-primary">About</a>
        <a href="projects.html" class="btn btn-outline-primary">Projects</a>
    </div>

    <!-- Social Media Links -->
    <div class="links my-4">
        <a href="mailto:your-email@example.com" title="Mail"><i class="fas fa-envelope"></i></a>
        <a href="https://www.linkedin.com/in/sakib-sarkar/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/Shakib-ewu" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://medium.com/@your-medium-username" target="_blank" title="Medium"><i class="fab fa-medium"></i></a>
    </div>
</div>

<footer>
    &copy; 2024 Sakib Sarkar
</footer>

</body>
</html>
